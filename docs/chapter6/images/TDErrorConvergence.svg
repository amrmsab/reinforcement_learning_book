<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 300" width="620" height="300" font-family="sans-serif">

  <!-- Background -->
  <rect width="620" height="300" fill="white"/>

  <!-- ── AXES ─────────────────────────────────────────────── -->

  <!-- Y-axis -->
  <line x1="70" y1="20" x2="70" y2="230" stroke="#374151" stroke-width="1.5"/>
  <!-- X-axis -->
  <line x1="70" y1="230" x2="590" y2="230" stroke="#374151" stroke-width="1.5"/>

  <!-- Axis arrows -->
  <polygon points="70,17 65,28 75,28" fill="#374151"/>
  <polygon points="593,230 582,225 582,235" fill="#374151"/>

  <!-- ── GRID LINES ─────────────────────────────────────────── -->
  <line x1="70" y1="75"  x2="590" y2="75"  stroke="#f3f4f6" stroke-width="1"/>
  <line x1="70" y1="120" x2="590" y2="120" stroke="#f3f4f6" stroke-width="1"/>
  <line x1="70" y1="165" x2="590" y2="165" stroke="#f3f4f6" stroke-width="1"/>

  <!-- ── Y-AXIS TICKS & LABELS ──────────────────────────────── -->
  <line x1="65" y1="75"  x2="70" y2="75"  stroke="#374151" stroke-width="1"/>
  <line x1="65" y1="120" x2="70" y2="120" stroke="#374151" stroke-width="1"/>
  <line x1="65" y1="165" x2="70" y2="165" stroke="#374151" stroke-width="1"/>
  <line x1="65" y1="230" x2="70" y2="230" stroke="#374151" stroke-width="1"/>

  <text x="58" y="78"  text-anchor="end" font-size="11" fill="#6b7280">high</text>
  <text x="58" y="123" text-anchor="end" font-size="11" fill="#6b7280"> </text>
  <text x="58" y="168" text-anchor="end" font-size="11" fill="#6b7280"> </text>
  <text x="58" y="234" text-anchor="end" font-size="11" fill="#6b7280">0</text>

  <!-- Y-axis label -->
  <text transform="rotate(-90)" x="-125" y="20" text-anchor="middle" font-size="13" fill="#374151">Mean TD Error</text>

  <!-- ── X-AXIS TICKS & LABELS ──────────────────────────────── -->
  <line x1="200" y1="230" x2="200" y2="235" stroke="#374151" stroke-width="1"/>
  <line x1="330" y1="230" x2="330" y2="235" stroke="#374151" stroke-width="1"/>
  <line x1="460" y1="230" x2="460" y2="235" stroke="#374151" stroke-width="1"/>
  <line x1="590" y1="230" x2="590" y2="235" stroke="#374151" stroke-width="1"/>

  <text x="70"  y="248" text-anchor="middle" font-size="11" fill="#6b7280">0</text>
  <text x="200" y="248" text-anchor="middle" font-size="11" fill="#6b7280">100</text>
  <text x="330" y="248" text-anchor="middle" font-size="11" fill="#6b7280">200</text>
  <text x="460" y="248" text-anchor="middle" font-size="11" fill="#6b7280">300</text>
  <text x="590" y="248" text-anchor="middle" font-size="11" fill="#6b7280">400</text>

  <!-- X-axis label -->
  <text x="330" y="270" text-anchor="middle" font-size="13" fill="#374151">Training Episode</text>

  <!-- ── Q-LEARNING CURVE (orange, solid) ──────────────────── -->
  <!-- Starts high, drops fast, settles low near 0 -->
  <path
    d="M 70,75
       C 90,75  110,82  130,100
       C 155,122 175,145 200,162
       C 225,177 250,187 280,195
       C 310,201 340,207 370,212
       C 400,215 430,218 460,220
       C 490,221 520,222 590,223"
    fill="none" stroke="#ea580c" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── SARSA CURVE (blue, dashed) ────────────────────────── -->
  <!-- Starts high, drops slower, plateaus above Q-Learning -->
  <path
    d="M 70,75
       C 92,75  115,80  140,96
       C 165,112 185,130 210,148
       C 235,163 260,173 290,180
       C 320,186 350,190 385,194
       C 415,197 445,200 475,203
       C 505,205 540,207 590,208"
    fill="none" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="8,4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- ── PLATEAU ANNOTATION LINES ─────────────────────────── -->
  <!-- Dashed horizontal guide for Q-Learning plateau -->
  <line x1="430" y1="220" x2="590" y2="220" stroke="#ea580c" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>
  <!-- Dashed horizontal guide for SARSA plateau -->
  <line x1="430" y1="205" x2="590" y2="205" stroke="#2563eb" stroke-width="1" stroke-dasharray="3,3" opacity="0.5"/>

  <!-- Gap annotation (brace-like) -->
  <line x1="575" y1="207" x2="575" y2="218" stroke="#6b7280" stroke-width="1"/>
  <line x1="572" y1="207" x2="578" y2="207" stroke="#6b7280" stroke-width="1"/>
  <line x1="572" y1="218" x2="578" y2="218" stroke="#6b7280" stroke-width="1"/>
  <text x="580" y="215" font-size="10" fill="#6b7280">Δ</text>

  <!-- ── LEGEND ─────────────────────────────────────────────── -->
  <line x1="95"  y1="35" x2="145" y2="35" stroke="#ea580c" stroke-width="2.5"/>
  <text x="153" y="39" font-size="12" fill="#374151">
    <tspan font-weight="700" fill="#ea580c">Q-Learning</tspan>
    <tspan> — converges to Q* (lower final error)</tspan>
  </text>

  <line x1="95"  y1="57" x2="145" y2="57" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="153" y="61" font-size="12" fill="#374151">
    <tspan font-weight="700" fill="#2563eb">SARSA</tspan>
    <tspan> — converges to cautious policy (higher residual error)</tspan>
  </text>

</svg>
