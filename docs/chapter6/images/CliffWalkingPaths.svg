<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 295" width="680" height="295" font-family="sans-serif">

  <!-- Background -->
  <rect width="680" height="295" fill="white"/>

  <!-- All-cells background -->
  <rect x="40" y="20" width="600" height="200" fill="#f9fafb"/>

  <!-- Cliff cells (row 3, col 1–10) -->
  <rect x="90" y="170" width="500" height="50" fill="#fee2e2"/>

  <!-- Start cell (row 3, col 0) -->
  <rect x="40" y="170" width="50" height="50" fill="#d1fae5"/>

  <!-- Goal cell (row 3, col 11) -->
  <rect x="590" y="170" width="50" height="50" fill="#fef3c7"/>

  <!-- Horizontal grid lines -->
  <line x1="40" y1="20"  x2="640" y2="20"  stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="70"  x2="640" y2="70"  stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="120" x2="640" y2="120" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="170" x2="640" y2="170" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="40" y1="220" x2="640" y2="220" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Vertical grid lines -->
  <line x1="40"  y1="20" x2="40"  y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="90"  y1="20" x2="90"  y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="140" y1="20" x2="140" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="190" y1="20" x2="190" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="240" y1="20" x2="240" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="290" y1="20" x2="290" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="340" y1="20" x2="340" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="390" y1="20" x2="390" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="440" y1="20" x2="440" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="490" y1="20" x2="490" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="540" y1="20" x2="540" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="590" y1="20" x2="590" y2="220" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="640" y1="20" x2="640" y2="220" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Grid outer border -->
  <rect x="40" y="20" width="600" height="200" fill="none" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Cliff border highlight -->
  <rect x="90" y="170" width="500" height="50" fill="none" stroke="#ef4444" stroke-width="1.5"/>

  <!-- S, G, and cliff labels -->
  <text x="65"  y="200" text-anchor="middle" font-size="15" font-weight="bold" fill="#065f46">S</text>
  <text x="615" y="200" text-anchor="middle" font-size="15" font-weight="bold" fill="#78350f">G</text>
  <text x="340" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#dc2626" letter-spacing="2">THE CLIFF</text>

  <!-- ── PATHS ─────────────────────────────────────────────── -->

  <!-- Q-Learning: row 2, solid orange -->
  <!-- (3,0)→(2,0)→(2,1)→...→(2,11)→(3,11) -->
  <polyline
    points="68,195 68,145 115,145 165,145 215,145 265,145 315,145 365,145 415,145 465,145 515,145 565,145 618,145 618,195"
    fill="none" stroke="#ea580c" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- SARSA: row 1, dashed blue -->
  <!-- (3,0)→(2,0)→(1,0)→(1,1)→...→(1,11)→(2,11)→(3,11) -->
  <polyline
    points="62,195 62,145 62,95 115,95 165,95 215,95 265,95 315,95 365,95 415,95 465,95 515,95 565,95 612,95 612,145 612,195"
    fill="none" stroke="#2563eb" stroke-width="3" stroke-dasharray="8,4" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Mid-path direction indicators (right-pointing triangles) -->
  <!-- Q-Learning indicator at col 6, row 2 -->
  <polygon points="324,139 336,145 324,151" fill="#ea580c"/>
  <!-- SARSA indicator at col 6, row 1 -->
  <polygon points="324,89 336,95 324,101" fill="#2563eb"/>

  <!-- ── LEGEND ──────────────────────────────────────────────── -->

  <!-- Q-Learning legend line -->
  <line x1="50" y1="248" x2="105" y2="248" stroke="#ea580c" stroke-width="3"/>
  <polygon points="100,242 112,248 100,254" fill="#ea580c"/>
  <text x="120" y="252" font-size="12" fill="#374151">
    <tspan font-weight="700" fill="#ea580c">Q-Learning</tspan>
    <tspan> — optimal path (hugs cliff edge, −13 reward)</tspan>
  </text>

  <!-- SARSA legend line -->
  <line x1="50" y1="272" x2="105" y2="272" stroke="#2563eb" stroke-width="3" stroke-dasharray="8,4"/>
  <polygon points="100,266 112,272 100,278" fill="#2563eb"/>
  <text x="120" y="276" font-size="12" fill="#374151">
    <tspan font-weight="700" fill="#2563eb">SARSA</tspan>
    <tspan> — safe path (one row higher, −15 reward)</tspan>
  </text>

</svg>
