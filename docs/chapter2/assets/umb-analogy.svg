<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" role="img" font-family="Georgia, 'Times New Roman', serif">
<title>One step of the MDP loop: the umbrella decision</title>
<desc>Forking diagram showing State St (cloudy sky), two action choices (take umbrella / leave it), and two outcome boxes showing next state and reward</desc>
<defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
    <path d="M1,1 L8,4.5 L1,8" fill="none" stroke="#111" stroke-width="1.3" stroke-linejoin="round"/>
  </marker>
</defs>

<!-- STATE BOX -->
<rect x="28" y="97" width="168" height="106" fill="#fff" stroke="#111" stroke-width="1.3" rx="2"/>
<line x1="28" y1="120" x2="196" y2="120" stroke="#111" stroke-width="0.8"/>
<text x="112" y="110" text-anchor="middle" font-weight="bold" font-size="13" fill="#111">State S<tspan dy="3" font-size="10">t</tspan></text>
<text x="112" y="141" text-anchor="middle" font-size="12" fill="#111">"It looks cloudy."</text>
<text x="112" y="160" text-anchor="middle" font-size="11" font-style="italic" fill="#444">(agent observes</text>
<text x="112" y="178" text-anchor="middle" font-size="11" font-style="italic" fill="#444">the environment)</text>

<!-- FORK -->
<line x1="196" y1="150" x2="232" y2="150" stroke="#111" stroke-width="1.2"/>
<line x1="232" y1="78" x2="232" y2="222" stroke="#111" stroke-width="1.2"/>

<!-- TOP ARROW (take umbrella) -->
<line x1="232" y1="78" x2="349" y2="78" stroke="#111" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- BOTTOM ARROW (leave it) -->
<line x1="232" y1="222" x2="349" y2="222" stroke="#111" stroke-width="1.2" marker-end="url(#arr)"/>

<!-- ACTION LABELS -->
<text x="290" y="64" text-anchor="middle" font-size="11.5" font-style="italic" fill="#111">take umbrella</text>
<text x="290" y="247" text-anchor="middle" font-size="11.5" font-style="italic" fill="#111">leave it</text>
<text x="290" y="147" text-anchor="middle" font-weight="bold" font-size="12" fill="#111">Action A<tspan dy="3" font-size="9">t</tspan></text>
<text x="290" y="165" text-anchor="middle" font-size="11" font-style="italic" fill="#444">(agent decides)</text>

<!-- TOP RESULT BOX -->
<rect x="350" y="28" width="292" height="100" fill="#fff" stroke="#111" stroke-width="1.3" rx="2"/>
<line x1="350" y1="50" x2="642" y2="50" stroke="#111" stroke-width="0.8"/>
<text x="496" y="42" text-anchor="middle" font-weight="bold" font-size="12" fill="#111">S<tspan dy="3" font-size="9">t+1</tspan><tspan dy="-3">  ·  R</tspan><tspan dy="3" font-size="9">t+1</tspan><tspan dy="-3"> = +1  &#x2713;</tspan></text>
<text x="496" y="70" text-anchor="middle" font-size="12" fill="#111">You arrive dry.</text>
<text x="496" y="90" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Good outcome &#x2014; reward +1.</text>
<text x="496" y="110" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Cycle repeats from S<tspan dy="3" font-size="9">t+1</tspan><tspan dy="-3">.</tspan></text>

<!-- BOTTOM RESULT BOX -->
<rect x="350" y="172" width="292" height="100" fill="#fff" stroke="#111" stroke-width="1.3" rx="2"/>
<line x1="350" y1="194" x2="642" y2="194" stroke="#111" stroke-width="0.8"/>
<text x="496" y="186" text-anchor="middle" font-weight="bold" font-size="12" fill="#111">S<tspan dy="3" font-size="9">t+1</tspan><tspan dy="-3">  ·  R</tspan><tspan dy="3" font-size="9">t+1</tspan><tspan dy="-3"> = &#x2212;1  &#x2717;</tspan></text>
<text x="496" y="214" text-anchor="middle" font-size="12" fill="#111">You arrive soaked.</text>
<text x="496" y="234" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Bad outcome &#x2014; reward &#x2212;1.</text>
<text x="496" y="254" text-anchor="middle" font-size="11" font-style="italic" fill="#444">Cycle repeats from S<tspan dy="3" font-size="9">t+1</tspan><tspan dy="-3">.</tspan></text>
</svg>
